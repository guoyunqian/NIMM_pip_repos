# SCD pair fusion config

[run]
# 无参数运行：实时模式，自动处理 allowed_realtime_minutes 中最近的起报批次。
# 带两个位置参数运行：历史回算模式，例如：
#   python run_scd_pair_fusion_from_config.py 202608080810 202608080840
# 时间格式固定为 UTC 的 YYYYMMDDHHMM。
allowed_realtime_minutes = 0,30
history_step_minutes = 10

# true 表示只检查配对关系，不写融合结果；false 表示正常输出融合文件。
dry_run = false

# 最多处理多少个配对文件；留空表示不限制。
max_files =

[paths]
source1_dir = /data/mnt/GUO_data/scd_data/process_10min_data/unet_qpf
source2_dir = /data/mnt/GUO_data/scd_data/process_10min_data/mait_st
truth_dir = /data/data_234/01CLDAS/02CMPAS/Minutely/RT_1km/APCP

# 输出结构：output_dir/YYYYMMDD/YYYYMMDDHHMM/YYYYMMDDHHMM.LLL.nc
output_dir = /data/mnt/GUO_data/scd_data//output_10min/unet_qpf_mait_st

[padding]
enabled = true
time_step_minutes = 10
overwrite = false


[fusion]
blending_type = salient

# source1 的权重；source2 权重 = 1 - source1 权重。
# 使用 lead_minutes:weight，脚本会按时效线性插值。
keyframe_weights = 0:1.0,60:0.8,120:0.4,180:0.0

# 可选裁剪范围；留空表示处理整张网格。
lon_min =
lon_max =
lat_min =
lat_max =

output_var = data0
output_source = scd_fused_unet_qpf_mait_st
