[runtime]
# 无参数运行：实时模式，自动处理 allowed_realtime_minutes 中最近的起报批次。
# 带两个位置参数运行：历史回算模式，例如：
#   python realtime_split_qpf.py 202608080810 202608080840
# 时间格式固定为 UTC 的 YYYYMMDDHHMM。
allowed_realtime_minutes = 0,30

[schedule]
# 仅 --daemon 模式使用；普通定时任务直接无参数调用脚本即可。
timezone = Asia/Shanghai
mode = interval
interval_minutes = 30
daily_times = 08:00,20:00

[source_unet_qpf]
base_dir = /data/data_215/unet_qpf
format = nc
forecast_minutes = 180
file_suffix = .nc
date_dir = true

[source_mait_st]
base_dir = /data/data_84/rain01/mait_st/sfc
format = m4
file_suffix = .m4
date_dir = true

[grid]
resolution_degree = 0.01
time_step_minutes = 10
include_zero_lead = false
unet_zero_lead = nan
# mait_st 额外拆分时长；用于融合结果尾部补齐到下一个整点。
mait_extra_minutes = 60

[output]
base_dir = /data/mnt/GUO_data/scd_data/process_10min_data
overwrite = false
compression_level = 4

[behavior]
strict_missing_mait = true
delete_broken_inputs = false
