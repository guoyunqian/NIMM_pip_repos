# ==============================================================================
# 网格天气现象电码生成系统 - 部署环境配置模板
# 使用方法：
#   1. 复制本文件为 config.ini（勿提交到版本库）
#   2. 修改 data_root 为实际数据路径
#   3. 通过环境变量或 CLI 参数生效（见下方说明）
# ==============================================================================

[data]
# 数据根目录（网格预报 NC 文件所在的根路径）
# 生效方式一：设置系统环境变量
#   Windows: set SCMOC_DATA_ROOT=\\your_server\your_share\SCMOC
#   Linux:   export SCMOC_DATA_ROOT=/mnt/nfs/SCMOC
# 生效方式二：CLI 参数（优先级最高）
#   python cli/main.py 2026030100 --data-root \\server\share\SCMOC
data_root = \\10.28.16.251\pool_public\SCMOC

[runtime]
# 时段间并行数（网络盘瓶颈，建议 3~5）
max_seg_workers = 5

# 单时段内文件并发读取线程数（本地 SSD 可设 8~12，网络盘建议 4~6）
max_workers = 9

# NumExpr 最大线程数（0 = 不限制，建议设为 CPU 核数）
# 对应环境变量: NUMEXPR_MAX_THREADS
numexpr_threads = 0

[output]
# 输出根目录
output_dir = ./PHENOM
